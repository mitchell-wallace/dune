# Pipelock config — balanced preset
# Generated by: pipelock generate config --preset balanced
# Version used during implementation: 2.0.0

version: 1
mode: balanced
enforce: null
explain_blocks: null
api_allowlist:
  - "*.anthropic.com"
  - "*.openai.com"
  - api.telegram.org
  - "*.discord.com"
  - gateway.discord.gg
  - "*.slack.com"
  - github.com
  - "*.github.com"
  - "*.githubusercontent.com"
  - registry.npmjs.org
fetch_proxy:
  listen: 127.0.0.1:8888
  timeout_seconds: 30
  monitoring:
    max_url_length: 2048
    entropy_threshold: 4.5
    max_requests_per_minute: 60
    max_data_per_minute: 0
    blocklist:
      - "*.pastebin.com"
      - "*.hastebin.com"
      - "*.paste.ee"
      - "*.transfer.sh"
      - "*.file.io"
      - "*.requestbin.com"
dlp:
  scan_env: true
  include_defaults: null
response_scanning:
  enabled: true
  action: warn
  include_defaults: null
logging:
  format: json
  output: stdout
request_body_scanning:
  enabled: true

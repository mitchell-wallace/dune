name: image

on:
  pull_request:
    paths:
      - .github/workflows/image.yml
      - Dockerfile
      - cmd/dune/**
      - container/base/**
      - go.mod
      - go.sum
      - internal/**
      - scripts/build-dune.sh
      - test/fixtures/sample-project/**
      - test/smoke/**
  push:
    branches: [main]
    paths:
      - container/base/IMAGE_VERSION
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run static and unit tests
        run: just test

      - name: Read image version
        id: version
        run: echo "value=$(tr -d '\n' < container/base/IMAGE_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ghcr.io/mitchell-wallace/dune-base:${{ steps.version.outputs.value }} \
            .

      - name: Smoke-test base image
        run: just smoke-base --skip-build --image ghcr.io/mitchell-wallace/dune-base:${{ steps.version.outputs.value }}

      - name: Smoke-test tool updates
        run: just smoke-tools --skip-build --image ghcr.io/mitchell-wallace/dune-base:${{ steps.version.outputs.value }}

  build-and-push:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read image version
        id: version
        run: echo "value=$(tr -d '\n' < container/base/IMAGE_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/mitchell-wallace/dune-base:${{ steps.version.outputs.value }}
            ghcr.io/mitchell-wallace/dune-base:latest
          build-args: |
            BUILDKIT_INLINE_CACHE=1
